name: Build Telegram X APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Universal APK
    runs-on: ubuntu-22.04
    env:
      TERM: xterm
      ANDROID_SDK_ROOT: /home/runner/android-sdk

    steps:
      # 1. Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: false

      # 2. Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Install System Dependencies
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq yasm wget unzip git python3 > /dev/null

      # 4. Comprehensive Dependency Setup
      - name: Setup Dependencies
        run: |
          set -e
          
          # Remove interfering header
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global url."https://github.com/".insteadOf "git@github.com:" || true
          
          # Function to clone a specific version of a repo
          # Usage: ensure_version URL DEST REF (branch or commit) RECURSIVE
          ensure_version() {
            local URL=$1
            local DEST=$2
            local REF=$3
            local RECURSIVE=$4
            
            # PROTECT tracked directories
            if [[ "$DEST" == "tgcalls" ]] || [[ "$DEST" == "app/jni/third_party/androidx-media" ]]; then
              echo "Preserving tracked directory: $DEST"
              return 0
            fi
            
            echo "--- Ensuring $DEST from $URL ($REF) ---"
            rm -rf "$DEST"
            mkdir -p "$DEST"
            cd "$DEST"
            git init -q
            git remote add origin "$URL"
            
            # Try to fetch the specific REF (commit or branch)
            if git fetch --depth 1 origin "$REF" 2>/dev/null; then
              git checkout -q FETCH_HEAD
              echo "SUCCESS: Fetched $REF"
            else
              echo "Ref $REF failed, fetching default branch..."
              git fetch --depth 1 origin 2>/dev/null
              git checkout -q FETCH_HEAD
            fi
            
            if [ "$RECURSIVE" == "true" ]; then
              git submodule update --init --recursive --depth 1 2>/dev/null || echo "Submodule update failed for $DEST"
            fi
            cd - > /dev/null
          }

          echo "Cloning core dependencies..."
          ensure_version "https://github.com/TGX-Android/tdlib" "tdlib" "main" "true"
          
          mkdir -p vkryl
          ensure_version "https://github.com/TGX-Android/leveldb" "vkryl/leveldb" "main" "true"
          ensure_version "https://github.com/TGX-Android/X-Core" "vkryl/core" "main" "false"
          ensure_version "https://github.com/TGX-Android/tdlib-utils" "vkryl/td" "main" "false"
          ensure_version "https://github.com/TGX-Android/X-Android" "vkryl/android" "main" "false"
          
          echo "Cloning native dependencies..."
          mkdir -p app/jni/third_party
          ensure_version "https://github.com/webmproject/libvpx" "app/jni/third_party/libvpx" "v1.13.1" "false"
          ensure_version "https://github.com/FFmpeg/FFmpeg" "app/jni/third_party/ffmpeg" "n6.1" "false"
          ensure_version "https://github.com/xiph/opus" "app/jni/third_party/opus" "v1.4" "false"
          ensure_version "https://github.com/xiph/flac" "app/jni/third_party/flac" "1.4.3" "false"
          ensure_version "https://github.com/xiph/ogg" "app/jni/third_party/ogg" "v1.3.5" "false"
          ensure_version "https://github.com/xiph/opusfile" "app/jni/third_party/opusfile" "v0.12" "false"
          ensure_version "https://github.com/TGX-Android/jni-utils" "app/jni/third_party/jni-utils" "main" "false"
          ensure_version "https://github.com/TGX-Android/rlottie" "app/jni/third_party/rlottie" "main" "false"
          ensure_version "https://github.com/webmproject/libwebp" "app/jni/third_party/webp" "v1.3.2" "false"
          ensure_version "https://chromium.googlesource.com/libyuv/libyuv" "app/jni/third_party/libyuv" "refs/heads/master" "false"
          ensure_version "https://github.com/lz4/lz4" "app/jni/third_party/lz4" "v1.9.4" "false"
          
          echo "Cloning WebRTC and tgvoip dependencies..."
          mkdir -p app/jni/tgvoip/third_party
          # Specific commit for WebRTC as per BuildWebRTC.cmake
          ensure_version "https://github.com/TGX-Android/webrtc" "app/jni/tgvoip/third_party/webrtc" "e3dfe44d1aea15a1aabded19d71884412e772245" "true"
          # Specific commit for tgcalls as per BuildTgCalls.cmake
          ensure_version "https://github.com/TGX-Android/tgcalls" "app/jni/tgvoip/third_party/tgcalls" "c89f009c29e7142f1935383a978f2ad7c46da4d1" "true"
          ensure_version "https://github.com/TGX-Android/libtgvoip" "app/jni/tgvoip/third_party/libtgvoip" "tgx" "false"
          ensure_version "https://github.com/TGX-Android/libevent" "app/jni/tgvoip/third_party/libevent" "release-2.1.12-stable" "false"
          ensure_version "https://github.com/google/crc32c" "app/jni/tgvoip/third_party/crc32c" "1.1.2" "false"
          ensure_version "https://github.com/xiph/rnnoise" "app/jni/tgvoip/third_party/rnnoise" "master" "false"
          ensure_version "https://github.com/sctplab/usrsctp" "app/jni/tgvoip/third_party/usrsctp" "0.9.5.0" "false"
          # Specific commit for libsrtp as per BuildLibSRTP.cmake
          ensure_version "https://github.com/cisco/libsrtp" "app/jni/tgvoip/third_party/libsrtp" "860492290f7d1f25e2bd45da6471bfd4cd4d7add" "false"
          ensure_version "https://github.com/cisco/openh264" "app/jni/tgvoip/third_party/openh264" "v2.4.1" "false"
          ensure_version "https://github.com/abseil/abseil-cpp" "app/jni/tgvoip/third_party/abseil-cpp" "20210324.2" "false"
          
          mkdir -p app/jni/tgvoip/third_party/webrtc_deps
          ensure_version "https://chromium.googlesource.com/chromium/src/base" "app/jni/tgvoip/third_party/webrtc_deps/base" "refs/heads/main" "false"
          ensure_version "https://chromium.googlesource.com/chromium/src/third_party" "app/jni/tgvoip/third_party/webrtc_deps/third_party" "refs/heads/main" "false"
          
          echo "Syncing WebRTC source to thirdparty/WebRTC/src..."
          mkdir -p thirdparty/WebRTC/src
          if [ -d "app/jni/tgvoip/third_party/webrtc" ]; then
            cp -r app/jni/tgvoip/third_party/webrtc/* thirdparty/WebRTC/src/
          fi
          
          mkdir -p thirdparty/androidx-media
          ensure_version "https://github.com/androidx/media" "thirdparty/androidx-media/legacy" "release" "false"
          ensure_version "https://github.com/androidx/media" "thirdparty/androidx-media/latest" "release" "false"
          ensure_version "https://github.com/androidx/media" "thirdparty/androidx-media/lollipop" "release" "false"

          echo "Fixing internal submodules..."
          if [ ! -f "tdlib/source/openssl/include/openssl/opensslv.h" ]; then
            ensure_version "https://github.com/openssl/openssl" "tdlib/source/openssl" "OpenSSL_1_1_1-stable" "false"
          fi
          if [ ! -f "vkryl/leveldb/jni/leveldb/CMakeLists.txt" ]; then
            ensure_version "https://github.com/google/leveldb" "vkryl/leveldb/jni/leveldb" "v1.23" "false"
          fi
          if [ ! -f "vkryl/leveldb/jni/jni-utils/CMakeLists.txt" ]; then
            ensure_version "https://github.com/TGX-Android/jni-utils" "vkryl/leveldb/jni/jni-utils" "main" "false"
          fi

          echo "Eliminating legacy build files..."
          find . -name "build.gradle" -type f | while read f; do
            if [ -f "${f}.kts" ]; then
              rm "$f"
            fi
          done

          echo "Diagnostic: Final file check"
          ls -l tgcalls/build.gradle.kts || echo "tgcalls KTS MISSING"
          ls -l app/jni/tgvoip/third_party/libsrtp/crypto/math/stat.c || echo "libsrtp stat.c MISSING"
          ls -l app/jni/tgvoip/third_party/tgcalls/tgcalls/legacy/InstanceImplLegacy.cpp || echo "tgcalls source MISSING"

      # 5. Pre-configure local.properties
      - name: Create local.properties
        run: |
          mkdir -p "${ANDROID_SDK_ROOT}"
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "telegram.api_id=${{ secrets.TELEGRAM_API_ID || '12345' }}" >> local.properties
          echo "telegram.api_hash=${{ secrets.TELEGRAM_API_HASH || 'abcdef0123456789abcdef0123456789' }}" >> local.properties
          echo "app.id=org.thunderdog.challegram" >> local.properties
          echo "app.name=Telegram X" >> local.properties
          echo "app.download_url=https://github.com/${{ github.repository }}" >> local.properties
          echo "app.sources_url=https://github.com/${{ github.repository }}" >> local.properties
          echo "tgx.extension=none" >> local.properties
          echo "keystore.file=$(pwd)/keystore.properties" >> local.properties
          
          if [ ! -f app/google-services.json ]; then
            echo '{"project_info":{"project_number":"1","project_id":"p","storage_bucket":"s"},"client":[{"client_info":{"mobilesdk_app_id":"1:1:android:1"},"api_key":[{"current_key":"k"}]}]}' > app/google-services.json
          fi

      # 6. Setup Keystore
      - name: Setup Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          echo "keystore.file=$(pwd)/debug.keystore" > keystore.properties
          echo "keystore.password=android" >> keystore.properties
          echo "key.alias=androiddebugkey" >> keystore.properties
          echo "key.password=android" >> keystore.properties

      # 7. Patch build scripts using Python
      - name: Patch Build Scripts
        run: |
          python3 -c '
          import os
          
          def patch_file(path, search, replace):
              if not os.path.exists(path): return
              with open(path, "r") as f: content = f.read()
              if search in content:
                  with open(path, "w") as f: f.write(content.replace(search, replace))
                  print(f"Patched {path}")

          # Fix typos and pipe issues
          patch_file("scripts/set-env.sh", "ANDROID_SDK_ROOT=$DEFAULT_ANDROID_SDK", "ANDROID_SDK_ROOT=$DEFAULT_ANDROID_SDK_ROOT")
          patch_file("scripts/setup-sdk.sh", "yes |", "echo y |")
          
          # Inject skip logic for non-ARM64/Latest
          def inject_skip(path, marker, skip_line):
              if not os.path.exists(path): return
              with open(path, "r") as f: lines = f.readlines()
              with open(path, "w") as f:
                  for line in lines:
                      f.write(line)
                      if marker in line: f.write(skip_line + "\n")

          inject_skip("scripts/private/build-ffmpeg-impl.sh", "function build_one {", "  if [[ \"$FLAVOR\" != \"latest\" ]] || [[ \"$PLATFORM\" != \"arm64-v8a\" ]]; then return 0; fi")
          inject_skip("scripts/private/build-vpx-impl.sh", "configure_make() {", "  if [[ \"$1\" != \"latest\" ]] || [[ \"$2\" != \"arm64-v8a\" ]]; then return 0; fi")
          
          # Fix libyuv missing MSA files in BuildYuv.cmake
          yuv_cmake = "app/jni/BuildYuv.cmake"
          if os.path.exists(yuv_cmake):
              with open(yuv_cmake, "r") as f: lines = f.readlines()
              with open(yuv_cmake, "w") as f:
                  for line in lines:
                      if "_msa.cc" in line:
                          f.write("# " + line)
                      else:
                          f.write(line)
              print(f"Patched {yuv_cmake} to disable MSA files")
          
          # Disable strict OpenSSL version check in app/build.gradle.kts
          app_gradle = "app/build.gradle.kts"
          if os.path.exists(app_gradle):
              with open(app_gradle, "r") as f: content = f.read()
              if "status != 0xf" in content:
                  content = content.replace("status != 0xf", "false")
                  print("Disabled strict OpenSSL version check in app/build.gradle.kts")
              if "missingDimensionStrategy" not in content:
                  if "defaultConfig {" in content:
                      content = content.replace("defaultConfig {", "defaultConfig {\n    missingDimensionStrategy(\"SDK\", \"latest\")\n    missingDimensionStrategy(\"ABI\", \"universal\")")
                      print("Added missingDimensionStrategy to app/build.gradle.kts")
              with open(app_gradle, "w") as f: f.write(content)
          '
          
          cat > scripts/ci_setup.sh <<'EOF'
          #!/bin/bash
          set -e
          source "$(pwd)/scripts/setup-sdk.sh" --default-sdk-root > /dev/null
          chmod +x scripts/private/*.sh
          scripts/private/patch-opus-impl.sh || true
          scripts/private/patch-androidx-media-impl.sh || true
          scripts/private/build-vpx-impl.sh > /dev/null || true
          scripts/private/build-ffmpeg-impl.sh > /dev/null || true
          EOF
          chmod +x scripts/ci_setup.sh

      # 8. Run Setup Script
      - name: Run Setup Script
        run: ./scripts/ci_setup.sh || echo "Setup finished with errors."

      # 9. Build the APK
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleLatestArm64Release --stacktrace --console=plain

      # 10. Upload Artifact
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TelegramX-Latest-Arm64-Release
          path: app/build/outputs/apk/latest/arm64/release/*.apk
          retention-days: 5
