name: Build & Sign Telegram X APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ─── 1. Checkout repository ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: TGX-Android/Telegram-X
          fetch-depth: 0
          submodules: false
          lfs: true

      # ─── 2. Java 21 ────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ─── 3. Android SDK + NDK + CMake ──────────────────────────────────────
      - name: Set up Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          chmod +x scripts/*.sh || true
          export PATH=$PATH:$(pwd)/scripts
          
          # Dynamically determine required NDK from version.properties
          if [ -f scripts/read-property.sh ] && [ -f version.properties ]; then
            P_NDK=$(read-property.sh version.properties version.ndk_primary || true)
            L_NDK=$(read-property.sh version.properties version.ndk_legacy || true)
          fi
          
          PRIMARY_NDK=${P_NDK:-"23.2.8568313"}
          LEGACY_NDK=${L_NDK:-"23.2.8568313"}
          
          echo "Installing NDK versions: $PRIMARY_NDK, $LEGACY_NDK"
          yes | sdkmanager --install \
            "ndk;$PRIMARY_NDK" \
            "ndk;$LEGACY_NDK" \
            "cmake;3.22.1" \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            "platforms;android-35" \
            "platforms;android-34"
          
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/$PRIMARY_NDK" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yasm wget unzip git python3 pkg-config libtool gettext ninja-build meson gperf bison flex libunwind-dev libgl1-mesa-dev libgles2-mesa-dev libjpeg-dev libpng-dev libxml2-utils liblzma-dev libbz2-dev zlib1g-dev libgcrypt20-dev libfontconfig1-dev libfreetype6-dev libx11-dev libxext-dev libssl-dev libcurl4-openssl-dev
          # Git Optimizations
          git config --global http.postBuffer 1048576000
          git config --global http.maxRequests 1
          git config --global core.compression 0
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          git config --global core.preloadindex true
          git config --global core.fscache true
          git config --global fetch.parallel 0

      # ─── 4. Cache native build outputs ─────────────────────────────────────
      - name: Cache native libraries
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/.cxx
            app/jni/build
            app/src/main/libs
            app/jni/third_party/ffmpeg/build
            app/jni/third_party/libvpx/build
          key: native-v24-${{ runner.os }}-${{ hashFiles('version.properties', 'scripts/private/*.sh') }}
          restore-keys: |
            native-v24-${{ runner.os }}-

      # ─── 5. Robust Dependency Setup ────────────────────────────────────────
      - name: Setup Dependencies
        run: |
          set -e
          set -x
          set -o pipefail
          
          git config --global url."https://github.com/".insteadOf || true
          git config --global url."https://github.com/".insteadOf "git@github.com:" || true
          
          # 5.1 diagnostics and prep
          chmod +x scripts/*.sh scripts/private/*.sh || true
          export PATH=$PATH:$(pwd)/scripts
          ls -la .gitmodules || echo ".gitmodules NOT FOUND"
          
          # 5.2 Patch scripts for ARM64 Latest build
          python3 -c '
          import os, re
          
          def patch_file_regex(path, pattern, replace):
              if not os.path.exists(path): return
              with open(path, "r") as f: content = f.read()
              new_content = re.sub(pattern, replace, content, count=1)
              if new_content != content:
                  with open(path, "w") as f: f.write(new_content)
                  print(f"Patched {path}")
              else:
                  print(f"PATTERN NOT MATCHED in {path}")

          patch_file_regex("scripts/set-env.sh", r"ANDROID_SDK_ROOT=$DEFAULT_ANDROID_SDK\b", "ANDROID_SDK_ROOT=$DEFAULT_ANDROID_SDK_ROOT")
          patch_file_regex("scripts/private/build-vpx-impl.sh", r"for ABI in arm64-v8a [^;]+ ; do", "for ABI in arm64-v8a ; do")
          patch_file_regex("scripts/private/build-vpx-impl.sh", r"for FLAVOR in latest [^;]+ ; do", "for FLAVOR in latest ; do")
          
          ffmpeg_script = "scripts/private/build-ffmpeg-impl.sh"
          if os.path.exists(ffmpeg_script):
              with open(ffmpeg_script, "r") as f: lines = f.readlines()
              with open(ffmpeg_script, "w") as f:
                  done = False
                  for line in lines:
                      f.write(line)
                      if "build_one" in line and not done and "function" not in line:
                          f.write("exit 0\n")
                          done = True
          '
          
          # Disable reset.sh
          echo "#!/bin/bash" > scripts/reset.sh
          echo "echo 'Skipping reset...'" >> scripts/reset.sh
          chmod +x scripts/reset.sh

          # 5.3 Dynamic Submodule Sync
          if [ -f .gitmodules ]; then
            echo "Syncing submodules..."
            git submodule sync --recursive
            git submodule init
            PATHS=$(git config --file .gitmodules --get-regexp path | awk 
'{print $2}' | tr -d '')
            for sm in $PATHS; do
              echo "Syncing $sm..."
              for i in {1..5}; do
                git submodule update --init --recursive --force --depth 1 "$sm" && break || {
                  if [ $i -eq 5 ]; then echo "FAILED to sync $sm, continuing anyway..."; break; fi
                  git submodule deinit -f "$sm" || true
                  rm -rf "$sm"
                  sleep 20
                }
              done
            done
          fi

          # 5.4 Environment Setup
          CPU_COUNT=$(nproc --all)
          
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_SDK_ROOT
          org.gradle.workers.max=$CPU_COUNT
          telegram.api_id=${{ secrets.TELEGRAM_API_ID || '12345' }}
          telegram.api_hash=${{ secrets.TELEGRAM_API_HASH || 'abcdef0123456789abcdef0123456789' }}
          app.id=org.thunderdog.challegram
          app.name=Telegram X
          app.download_url=https://github.com/${{ github.repository }}
          app.sources_url=https://github.com/${{ github.repository }}
          keystore.file=$(pwd)/keystore.jks
          EOF
          
          # 5.5 Build Native (if not cached)
          if [ "${{ steps.native-cache.outputs.cache-hit }}" != "true" ]; then
            ./scripts/setup.sh --skip-sdk-setup
          else
            echo "Cache hit, skipping setup.sh and running patches manually..."
            source ./scripts/set-env.sh --default-sdk-root
            ./scripts/private/patch-opus-impl.sh || true
            ./scripts/private/patch-androidx-media-impl.sh || true
          fi

      # ─── 6. Verify and Final Config ────────────────────────────────────────
      - name: Verify results and Final Config
        run: |
          ls -R app/jni/third_party/ffmpeg/build/latest/arm64-v8a/include || echo "FFmpeg headers NOT FOUND"
          git submodule status
          cat > local.properties <<EOF
          sdk.dir=${ANDROID_SDK_ROOT}
          org.gradle.workers.max=$(nproc --all)
          telegram.api_id=${{ secrets.TELEGRAM_API_ID }}
          telegram.api_hash=${{ secrets.TELEGRAM_API_HASH }}
          EOF

      # ─── 7. Keystore ───────────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Generating dummy keystore..."
            keytool -genkey -v -keystore keystore.jks -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          fi

      # ─── 8. Build ──────────────────────────────────────────────────────────
      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleLatestArm64Release --stacktrace
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}

      # ─── 9. Sign ───────────────────────────────────────────────────────────
      - name: Sign APK
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | grep "release" | head -1)
          if [ -z "$APK_PATH" ]; then exit 1; fi
          
          KS_PASS=${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KS_ALIAS=${{ secrets.KEY_ALIAS || 'androiddebugkey' }}
          KEY_PASS=${{ secrets.KEY_PASSWORD || 'android' }}

          $ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:"$KS_PASS" \
            --ks-key-alias "$KS_ALIAS" \
            --key-pass pass:"$KEY_PASS" \
            --out app-release-signed.apk \
            "$APK_PATH"

      # ─── 10. Upload ────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telegram-x-signed-${{ github.run_number }}
          path: app-release-signed.apk
          retention-days: 30
