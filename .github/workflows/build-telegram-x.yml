name: Build & Sign Telegram X APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TERM: xterm

    steps:
      # ─── 1. Checkout repositories ─────────────────────────────────────────
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: TGX-Android/Telegram-X
          fetch-depth: 0
          submodules: false
          lfs: true

      - name: Checkout helper scripts
        uses: actions/checkout@v4
        with:
          path: helpers

      # ─── 2. Java 21 ────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ─── 3. Android SDK + NDK + CMake ──────────────────────────────────────
      - name: Set up Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          chmod +x scripts/*.sh || true
          
          # Dynamically determine required NDK from version.properties
          if [ -f scripts/read-property.sh ] && [ -f version.properties ]; then
            P_NDK=$(grep "version.ndk_primary" version.properties | cut -d'=' -f2 | tr -d '\r')
            L_NDK=$(grep "version.ndk_legacy" version.properties | cut -d'=' -f2 | tr -d '\r')
          fi
          
          PRIMARY_NDK=${P_NDK:-"23.2.8568313"}
          LEGACY_NDK=${L_NDK:-"23.2.8568313"}
          
          echo "Installing NDK versions: $PRIMARY_NDK, $LEGACY_NDK"
          yes | sdkmanager --install \
            "ndk;$PRIMARY_NDK" \
            "ndk;$LEGACY_NDK" \
            "cmake;3.22.1" \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            "platforms;android-35" \
            "platforms;android-34"
          
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/$PRIMARY_NDK" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yasm nasm wget unzip git python3 pkg-config libtool gettext ninja-build meson gperf bison flex libunwind-dev libgl1-mesa-dev libgles2-mesa-dev libjpeg-dev libpng-dev libxml2-utils liblzma-dev libbz2-dev zlib1g-dev libgcrypt20-dev libfontconfig1-dev libfreetype6-dev libx11-dev libxext-dev libssl-dev libcurl4-openssl-dev

      # ─── 4. Cache native build outputs ─────────────────────────────────────
      - name: Cache native libraries
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/.cxx
            app/jni/build
            app/src/main/libs
            app/jni/third_party/ffmpeg/build
            app/jni/third_party/libvpx/build
          key: native-v28-${{ runner.os }}-${{ hashFiles('version.properties', 'helpers/ci/*.sh', 'helpers/ci/*.py') }}
          restore-keys: |
            native-v28-${{ runner.os }}-

      # ─── 5. Setup and Build Dependencies ───────────────────────────────────
      - name: Setup Dependencies
        run: bash helpers/ci/setup_dependencies.sh
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID || '12345' }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH || 'abcdef0123456789abcdef0123456789' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CACHE_HIT: ${{ steps.native-cache.outputs.cache-hit }}
          HELPERS_DIR: ${{ github.workspace }}/helpers/ci

      # ─── 6. Verify and Final Config ────────────────────────────────────────
      - name: Verify results and Final Config
        run: |
          ls -R app/jni/third_party/ffmpeg/build/latest/arm64-v8a/include || echo "FFmpeg headers NOT FOUND"
          git submodule status
          cat > local.properties <<EOF
          sdk.dir=${ANDROID_SDK_ROOT}
          org.gradle.workers.max=$(nproc --all)
          telegram.api_id=${{ secrets.TELEGRAM_API_ID }}
          telegram.api_hash=${{ secrets.TELEGRAM_API_HASH }}
          EOF

      # ─── 7. Keystore ───────────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Generating dummy keystore..."
            keytool -genkey -v -keystore keystore.jks -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          fi

      # ─── 8. Build ──────────────────────────────────────────────────────────
      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleLatestArm64Release --stacktrace
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}

      # ─── 9. Sign ───────────────────────────────────────────────────────────
      - name: Sign APK
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | grep "release" | head -1)
          if [ -z "$APK_PATH" ]; then exit 1; fi
          
          KS_PASS=${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KS_ALIAS=${{ secrets.KEY_ALIAS || 'androiddebugkey' }}
          KEY_PASS=${{ secrets.KEY_PASSWORD || 'android' }}

          $ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:"$KS_PASS" \
            --ks-key-alias "$KS_ALIAS" \
            --key-pass pass:"$KEY_PASS" \
            --out app-release-signed.apk \
            "$APK_PATH"

      # ─── 10. Upload ────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telegram-x-signed-${{ github.run_number }}
          path: app-release-signed.apk
          retention-days: 30
