name: Build & Sign Telegram X APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ─── 1. Checkout repository ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: TGX-Android/Telegram-X
          fetch-depth: 0 # full history for submodule stability
          submodules: false

      # ─── 2. Java 21 ────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ─── 3. Android SDK + NDK + CMake ──────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          yes | sdkmanager --install \
            "ndk;23.2.8568313" \
            "cmake;3.22.1" \
            "build-tools;36.0.0" \
            "platforms;android-36"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yasm wget unzip git python3 pkg-config libtool gettext ninja-build meson

      # ─── 4. Cache native build outputs ─────────────────────────────────────
      - name: Cache native libraries
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/.cxx
            app/jni/build
            app/src/main/libs
            app/jni/third_party/ffmpeg/build
            app/jni/third_party/libvpx/build
          key: native-v3-${{ runner.os }}-${{ hashFiles('version.properties', 'scripts/private/*.sh') }}
          restore-keys: |
            native-v3-${{ runner.os }}-

      # ─── 5. Handle Submodules Surgical Sync ────────────────────────────────
      - name: Sync submodules
        run: |
          set -e
          git config --global url."https://github.com/".insteadOf "git@github.com:" || true
          
          echo "Disk space before sync:"
          df -h
          
          # Initialize submodules
          git submodule init
          
          # curating list of submodules to avoid huge overhead
          SUBMODULES=(
            "app/jni/third_party/ffmpeg"
            "app/jni/third_party/libvpx"
            "app/jni/third_party/opus"
            "app/jni/third_party/webp"
            "app/jni/third_party/libyuv"
            "app/jni/third_party/lz4"
            "app/jni/third_party/jni-utils"
            "app/jni/third_party/rlottie"
            "tdlib"
            "vkryl/leveldb"
            "vkryl/core"
            "vkryl/td"
            "vkryl/android"
            "app/jni/tgvoip/third_party/libtgvoip"
            "app/jni/tgvoip/third_party/webrtc"
            "app/jni/tgvoip/third_party/tgcalls"
            "app/jni/tgvoip/third_party/rnnoise"
            "app/jni/tgvoip/third_party/libsrtp"
            "app/jni/tgvoip/third_party/usrsctp"
            "app/jni/tgvoip/third_party/openh264"
            "app/jni/tgvoip/third_party/abseil-cpp"
            "app/jni/tgvoip/third_party/libevent"
            "app/jni/tgvoip/third_party/crc32c"
            "app/jni/tgvoip/third_party/webrtc_deps/base"
            "app/jni/tgvoip/third_party/webrtc_deps/third_party"
            "thirdparty/androidx-media/latest"
            "thirdparty/androidx-media/legacy"
            "thirdparty/androidx-media/lollipop"
          )
          
          for sm in "${SUBMODULES[@]}"; do
            echo "Syncing: $sm"
            for i in {1..3}; do
              git submodule update --init --recursive --depth 1 "$sm" && break || {
                echo "Failed to sync $sm, attempt $i. Cleaning and retrying..."
                rm -rf "$sm"
                git submodule update --init --recursive --force --depth 1 "$sm" && break || sleep 10
              }
            done
          done
          
          echo "Disk space after sync:"
          df -h

      # ─── 6. Build Native Dependencies ──────────────────────────────────────
      - name: Build native dependencies
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          
          # 6.1 Patch scripts
          python3 -c '
          import os
          
          def patch_file(path, search, replace):
              if not os.path.exists(path): return
              with open(path, "r") as f: content = f.read()
              if search in content:
                  with open(path, "w") as f: f.write(content.replace(search, replace))
                  print(f"Patched {path}")

          patch_file("scripts/set-env.sh", "ANDROID_SDK_ROOT=$DEFAULT_ANDROID_SDK", "ANDROID_SDK_ROOT=$DEFAULT_ANDROID_SDK_ROOT")
          patch_file("scripts/private/build-vpx-impl.sh", "for ABI in arm64-v8a armeabi-v7a x86_64 x86 ; do", "for ABI in arm64-v8a ; do")
          patch_file("scripts/private/build-vpx-impl.sh", "for FLAVOR in latest lollipop legacy ; do", "for FLAVOR in latest ; do")
          
          ffmpeg_script = "scripts/private/build-ffmpeg-impl.sh"
          if os.path.exists(ffmpeg_script):
              with open(ffmpeg_script, "r") as f: lines = f.readlines()
              with open(ffmpeg_script, "w") as f:
                  done = False
                  for line in lines:
                      f.write(line)
                      if "build_one" in line and not done and "function" not in line:
                          f.write("exit 0\n")
                          done = True
          
          patch_file("scripts/setup.sh", "source scripts/reset.sh", "# source scripts/reset.sh")
          '
          
          # 6.2 Configure environment
          chmod +x scripts/*.sh scripts/private/*.sh
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          CPU_COUNT=$(nproc --all)
          
          # Create local.properties early
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          org.gradle.workers.max=$CPU_COUNT
          telegram.api_id=${{ secrets.TELEGRAM_API_ID || '12345' }}
          telegram.api_hash=${{ secrets.TELEGRAM_API_HASH || 'abcdef0123456789abcdef0123456789' }}
          app.id=org.thunderdog.challegram
          app.name=Telegram X
          app.download_url=https://github.com/${{ github.repository }}
          app.sources_url=https://github.com/${{ github.repository }}
          keystore.file=$(pwd)/keystore.jks
          EOF
          
          # 6.3 Run setup
          ./scripts/setup.sh --skip-sdk-setup
        env:
          ANDROID_NDK_VERSION_PRIMARY: 23.2.8568313
          ANDROID_NDK_VERSION_LEGACY: 23.2.8568313

      # ─── 7. Mandatory patches (Fast) ───────────────────────────────────────
      - name: Apply mandatory source patches
        run: |
          chmod +x scripts/*.sh scripts/private/*.sh
          export SED="sed"
          export THIRDPARTY_LIBRARIES="$(pwd)/app/jni/third_party"
          ./scripts/private/patch-opus-impl.sh || true
          ./scripts/private/patch-androidx-media-impl.sh || true
        env:
          ANDROID_NDK_VERSION_PRIMARY: 23.2.8568313
          ANDROID_NDK_VERSION_LEGACY: 23.2.8568313

      # ─── 8. Verify native build results ────────────────────────────────────
      - name: Verify native artifacts
        run: |
          ls -R app/jni/third_party/ffmpeg/build/latest/arm64-v8a/include || echo "FFmpeg headers NOT FOUND"
          ls -R app/jni/third_party/libvpx/build/latest/arm64-v8a/include || echo "libvpx headers NOT FOUND"

      # ─── 9. Final Configure local.properties ───────────────────────────────
      - name: Final Configure local.properties
        run: |
          cat > local.properties <<EOF
          sdk.dir=${ANDROID_SDK_ROOT}
          org.gradle.workers.max=$(nproc --all)
          telegram.api_id=${{ secrets.TELEGRAM_API_ID }}
          telegram.api_hash=${{ secrets.TELEGRAM_API_HASH }}
          EOF

      # ─── 10. Decode & write the signing keystore ───────────────────────────
      - name: Decode keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "KEYSTORE_BASE64 secret is missing! Generating dummy..."
            keytool -genkey -v -keystore keystore.jks -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          fi

      # ─── 11. Gradle build ──────────────────────────────────────────────────
      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleLatestArm64Release --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/23.2.8568313
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}

      # ─── 12. Sign the APK ──────────────────────────────────────────────────
      - name: Sign APK
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | grep "release" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found to sign!"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"

          KS_PASS=${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KS_ALIAS=${{ secrets.KEY_ALIAS || 'androiddebugkey' }}
          KEY_PASS=${{ secrets.KEY_PASSWORD || 'android' }}

          $ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:"$KS_PASS" \
            --ks-key-alias "$KS_ALIAS" \
            --key-pass pass:"$KEY_PASS" \
            --out app-release-signed.apk \
            "$APK_PATH"

      # ─── 13. Verify & Upload ───────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          $ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner verify --verbose app-release-signed.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: telegram-x-signed-${{ github.run_number }}
          path: app-release-signed.apk
          retention-days: 30
