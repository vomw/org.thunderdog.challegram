name: Build Telegram X APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Universal APK
    runs-on: ubuntu-22.04
    env:
      TERM: xterm
      ANDROID_SDK_ROOT: /home/runner/android-sdk

    steps:
      # 1. Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: false

      # 2. Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Install System Dependencies
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yasm wget unzip git python3

      # 4. Robust Submodule Setup
      - name: Setup Submodules
        run: |
          set -e
          # Unset interfering header
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global url."https://github.com/".insteadOf "git@github.com:" || true
          
          # Function to safely clone a repo
          safe_clone() {
            local URL=$1
            local DEST=$2
            local BRANCH=$3
            local RECURSIVE=$4
            echo "Cloning $DEST..."
            rm -rf "$DEST"
            mkdir -p "$(dirname "$DEST")"
            local OPTS="--depth 1"
            if [ "$RECURSIVE" == "true" ]; then OPTS="$OPTS --recursive"; fi
            if [ -n "$BRANCH" ]; then OPTS="$OPTS -b $BRANCH"; fi
            git clone $OPTS "$URL" "$DEST" || git clone "$URL" "$DEST"
          }

          echo "Cloning core dependencies..."
          safe_clone "https://github.com/TGX-Android/tdlib" "tdlib" "main" "true"
          safe_clone "https://github.com/TGX-Android/tgcalls" "tgcalls" "master" "true"
          
          mkdir -p vkryl
          safe_clone "https://github.com/TGX-Android/leveldb" "vkryl/leveldb" "main" "true"
          safe_clone "https://github.com/TGX-Android/X-Core" "vkryl/core" "main" "false"
          safe_clone "https://github.com/TGX-Android/tdlib-utils" "vkryl/td" "main" "false"
          safe_clone "https://github.com/TGX-Android/X-Android" "vkryl/android" "main" "false"
          
          echo "Cloning native dependencies..."
          mkdir -p app/jni/third_party
          safe_clone "https://github.com/webmproject/libvpx" "app/jni/third_party/libvpx" "" "false"
          safe_clone "https://github.com/FFmpeg/FFmpeg" "app/jni/third_party/ffmpeg" "release/6.1" "false"
          safe_clone "https://github.com/xiph/opus" "app/jni/third_party/opus" "" "false"
          safe_clone "https://github.com/xiph/flac" "app/jni/third_party/flac" "" "false"
          safe_clone "https://github.com/xiph/ogg" "app/jni/third_party/ogg" "" "false"
          safe_clone "https://github.com/xiph/opusfile" "app/jni/third_party/opusfile" "" "false"
          safe_clone "https://github.com/TGX-Android/jni-utils" "app/jni/third_party/jni-utils" "main" "false"
          safe_clone "https://github.com/TGX-Android/rlottie" "app/jni/third_party/rlottie" "main" "false"
          safe_clone "https://github.com/webmproject/libwebp" "app/jni/third_party/webp" "1.4.0" "false"
          safe_clone "https://chromium.googlesource.com/libyuv/libyuv" "app/jni/third_party/libyuv" "" "false"
          safe_clone "https://github.com/lz4/lz4" "app/jni/third_party/lz4" "" "false"
          
          echo "Cloning WebRTC for tgcalls..."
          mkdir -p app/jni/tgvoip/third_party
          safe_clone "https://github.com/TGX-Android/webrtc" "app/jni/tgvoip/third_party/webrtc" "telegram" "true"
          safe_clone "https://github.com/TGX-Android/libtgvoip" "app/jni/tgvoip/third_party/libtgvoip" "tgx" "false"
          
          mkdir -p thirdparty/WebRTC
          if [ -d "app/jni/tgvoip/third_party/webrtc/src" ]; then
            cp -r app/jni/tgvoip/third_party/webrtc/src thirdparty/WebRTC/
          fi
          
          mkdir -p thirdparty/androidx-media
          safe_clone "https://github.com/androidx/media" "thirdparty/androidx-media/legacy" "release" "false"
          safe_clone "https://github.com/androidx/media" "app/jni/third_party/androidx-media" "release" "false"

          echo "Fixing internal submodules..."
          if [ ! -f "tdlib/source/openssl/include/openssl/opensslv.h" ]; then
            safe_clone "https://github.com/openssl/openssl" "tdlib/source/openssl" "OpenSSL_1_1_1-stable" "false"
          fi
          if [ ! -f "vkryl/leveldb/jni/leveldb/CMakeLists.txt" ]; then
            safe_clone "https://github.com/google/leveldb" "vkryl/leveldb/jni/leveldb" "" "false"
          fi
          if [ ! -f "vkryl/leveldb/jni/jni-utils/CMakeLists.txt" ]; then
            safe_clone "https://github.com/TGX-Android/jni-utils" "vkryl/leveldb/jni/jni-utils" "main" "false"
          fi

      # 5. Pre-configure local.properties
      - name: Create local.properties
        run: |
          mkdir -p "${ANDROID_SDK_ROOT}"
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "telegram.api_id=${{ secrets.TELEGRAM_API_ID || '12345' }}" >> local.properties
          echo "telegram.api_hash=${{ secrets.TELEGRAM_API_HASH || 'abcdef0123456789abcdef0123456789' }}" >> local.properties
          echo "app.id=org.thunderdog.challegram" >> local.properties
          echo "app.name=Telegram X" >> local.properties
          echo "app.download_url=https://github.com/${{ github.repository }}" >> local.properties
          echo "app.sources_url=https://github.com/${{ github.repository }}" >> local.properties
          echo "tgx.extension=none" >> local.properties
          echo "keystore.file=$(pwd)/keystore.properties" >> local.properties
          
          if [ ! -f app/google-services.json ]; then
            echo '{"project_info":{"project_number":"1","project_id":"p","storage_bucket":"s"},"client":[{"client_info":{"mobilesdk_app_id":"1:1:android:1","android_client_info":{"package_name":"org.thunderdog.challegram"}},"api_key":[{"current_key":"k"}]}]}' > app/google-services.json
          fi

      # 6. Setup Keystore
      - name: Setup Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          echo "keystore.file=$(pwd)/debug.keystore" > keystore.properties
          echo "keystore.password=android" >> keystore.properties
          echo "key.alias=androiddebugkey" >> keystore.properties
          echo "key.password=android" >> keystore.properties

      # 7. Patch build scripts using Python
      - name: Patch Build Scripts
        run: |
          python3 -c '
          import os
          
          def patch_file(path, search, replace):
              if not os.path.exists(path): return
              with open(path, "r") as f: content = f.read()
              if search in content:
                  with open(path, "w") as f: f.write(content.replace(search, replace))
                  print(f"Patched {path}")

          patch_file("scripts/set-env.sh", "ANDROID_SDK_ROOT=$DEFAULT_ANDROID_SDK", "ANDROID_SDK_ROOT=$DEFAULT_ANDROID_SDK_ROOT")
          patch_file("scripts/setup-sdk.sh", "yes |", "echo y |")
          
          def inject_skip(path, marker, skip_line):
              if not os.path.exists(path): return
              with open(path, "r") as f: lines = f.readlines()
              with open(path, "w") as f:
                  for line in lines:
                      f.write(line)
                      if marker in line: f.write(skip_line + "\n")

          inject_skip("scripts/private/build-ffmpeg-impl.sh", "function build_one {", "  if [[ \"$FLAVOR\" != \"latest\" ]] || [[ \"$PLATFORM\" != \"arm64-v8a\" ]]; then return 0; fi")
          inject_skip("scripts/private/build-vpx-impl.sh", "configure_make() {", "  if [[ \"$1\" != \"latest\" ]] || [[ \"$2\" != \"arm64-v8a\" ]]; then return 0; fi")
          
          patch_file("app/jni/BuildYuv.cmake", "\"${YUV_DIR}/source/compare_msa.cc\"", "# missing mips file")
          '
          
          cat > scripts/ci_setup.sh <<'EOF'
          #!/bin/bash
          set -e
          source "$(pwd)/scripts/setup-sdk.sh" --default-sdk-root
          chmod +x scripts/private/*.sh
          scripts/private/patch-opus-impl.sh || true
          scripts/private/patch-androidx-media-impl.sh || true
          scripts/private/build-vpx-impl.sh || true
          scripts/private/build-ffmpeg-impl.sh || true
          EOF
          chmod +x scripts/ci_setup.sh

      # 8. Run Setup Script
      - name: Run Setup Script
        run: ./scripts/ci_setup.sh || echo "Setup finished with errors."

      # 9. Build the APK
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleLatestArm64Release --stacktrace

      # 10. Upload Artifact
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TelegramX-Latest-Arm64-Release
          path: app/build/outputs/apk/latest/arm64/release/*.apk
          retention-days: 5
